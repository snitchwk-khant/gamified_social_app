<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c446ff" />
    <title>Gemify Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(196, 70, 255, 0.18), transparent 34%),
          #020617;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid #1e293b;
        border-radius: 28px;
        padding: 36px 24px;
        text-align: center;
        background: #020617;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      }

      .icon {
        font-size: 56px;
        line-height: 1;
      }

      h1 {
        margin: 18px 0 0;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 14px auto 0;
        max-width: 320px;
        color: #94a3b8;
        line-height: 1.6;
      }

      button {
        height: 44px;
        margin-top: 26px;
        border: 0;
        border-radius: 16px;
        padding: 0 22px;
        color: white;
        background: #c446ff;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">💎</div>
      <h1>Gemify is offline</h1>
      <p>Check your internet connection and try again. Cached app screens may still open while you are offline.</p>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
  </body>
</html>
